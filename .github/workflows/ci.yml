name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Check out the post-merge state on PRs so CI validates what will land on main,
# not just the branch tip. Falls back to the commit SHA on push/workflow_dispatch.
env:
  CHECKOUT_REF: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
      - run: npm test

  synth:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::975050268859:role/nakomis-codeartifact-github-ci-sandbox
          aws-region: eu-west-2
      - name: CDK synth (sandbox)
        run: NPM_ENVIRONMENT=sandbox npx cdk synth --all --output cdk-synth.out

  deploy-sandbox:
    runs-on: ubuntu-latest
    needs: [test, synth]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: sandbox
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
      - name: Configure AWS credentials (sandbox)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::975050268859:role/nakomis-codeartifact-github-ci-sandbox
          aws-region: eu-west-2
      - name: Deploy to sandbox
        run: npm run ci-deploy-sandbox

  deploy-production:
    runs-on: ubuntu-latest
    needs: [deploy-sandbox]
    if: github.event_name == 'push'
    environment: production
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::637423226886:role/nakomis-codeartifact-github-ci-prod
          aws-region: eu-west-2
      - name: Deploy to production
        run: npm run ci-deploy-prod
