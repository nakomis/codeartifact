name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
      - run: npm test

  synth:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::975050268859:role/nakomis-codeartifact-github-ci-sandbox
          aws-region: eu-west-2
      - name: CDK synth (sandbox)
        run: NPM_ENVIRONMENT=sandbox npx cdk synth --all --output cdk-synth.out

  deploy-sandbox:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [test, synth]
    runs-on: ubuntu-latest
    environment: sandbox
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
      - name: Configure AWS credentials (sandbox)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::975050268859:role/nakomis-codeartifact-github-ci-sandbox
          aws-region: eu-west-2
      - name: Deploy to sandbox
        run: npm run ci-deploy-sandbox

  deploy-production:
    if: github.event_name == 'push'
    needs: [deploy-sandbox]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
      - name: Configure AWS credentials (production)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::637423226886:role/nakomis-codeartifact-github-ci-prod
          aws-region: eu-west-2
      - name: Deploy to production
        run: npm run ci-deploy-prod
